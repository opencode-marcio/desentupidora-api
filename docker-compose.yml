version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: desentupidora
      POSTGRES_PASSWORD: desentupidora123
      POSTGRES_DB: desentupidora
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://desentupidora:desentupidora123@postgres:5432/desentupidora
      JWT_SECRET: ${JWT_SECRET:-desentupidora-app-secret-key-2026}
      UPLOAD_DIR: /app/uploads
      PORT: 3000
      DB_SSL: "false"
    volumes:
      - uploads:/app/uploads
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
